<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TECNORIVAS</title>
    <meta name="description" content="Sistema Administrativo TECNORIVAS - Portal de acceso seguro">
    <link rel="stylesheet" href="bt/bootstrap.min.css">
    <link rel="stylesheet" href="bt-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/sweetalert2.all.min.js"></script>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">
                <i class="bi bi-snow3"></i>
            </div>
            <h1>TECNORIVAS</h1>
            <p>Sistema Administrativo</p>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="login-usuario" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="login-usuario" placeholder="Ingrese su usuario" required autocomplete="username">
                </div>
            </div>

            <div class="mb-4">
                <label for="login-contrasena" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="login-contrasena" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" id="toggle-pass">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="btn-login">
                <span id="btn-login-text"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
                <span id="btn-login-spinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span>Verificando...
                </span>
            </button>
        </form>

        <hr class="my-4">
        <div class="text-center" style="font-size:12px;color:#999;">
            <i class="bi bi-info-circle me-1"></i>
            <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; vendedor / vendedor123
        </div>
    </div>
</div>

<script src="bt/bootstrap.min.js"></script>
<script src="js/app.js"></script>
<script>
    // Redirigir si ya hay sesión
    if (obtenerSesion()) window.location.href = 'pages/dashboard.html';

    // Toggle contraseña
    document.getElementById('toggle-pass').addEventListener('click', () => {
        const inp = document.getElementById('login-contrasena');
        const ico = document.querySelector('#toggle-pass i');
        if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
        else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
    });

    // Login
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const usuario = document.getElementById('login-usuario').value.trim();
        const contrasena = document.getElementById('login-contrasena').value.trim();

        // Mostrar spinner
        document.getElementById('btn-login-text').classList.add('d-none');
        document.getElementById('btn-login-spinner').classList.remove('d-none');

        await new Promise(r => setTimeout(r, 600)); // Simular delay

        const usuarios = obtenerDatos('usuarios_tecnorivas');
        const user = usuarios.find(u => u.usuario === usuario && u.contrasena === contrasena);

        if (user) {
            guardarSesion({ id: user.id, nombre: user.nombre, usuario: user.usuario, rol: user.rol });
            await Swal.fire({
                icon: 'success',
                title: `¡Bienvenido, ${user.nombre}!`,
                text: `Rol: ${user.rol === 'admin' ? 'Administrador' : 'Vendedor'}`,
                timer: 1500,
                showConfirmButton: false
            });
            window.location.href = 'pages/dashboard.html';
        } else {
            document.getElementById('btn-login-text').classList.remove('d-none');
            document.getElementById('btn-login-spinner').classList.add('d-none');
            Swal.fire({ icon: 'error', title: 'Credenciales incorrectas', text: 'Verifique su usuario y contraseña.' });
        }
    });
</script>
</body>
</html>
