<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if (localStorage.getItem('sesion_tecnorivas') && !window.location.href.includes('login.html')) {
            window.location.href = 'pages/dashboard.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TECNORIVAS</title>
    <meta name="description" content="Sistema Administrativo TECNORIVAS - Portal de acceso seguro">
    <link rel="stylesheet" href="bt/bootstrap.min.css">
    <link rel="stylesheet" href="bt-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/sweetalert2.all.min.js"></script>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">
                <i class="bi bi-snow3"></i>
            </div>
            <h1>TECNORIVAS</h1>
            <p>Sistema Administrativo</p>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="login-usuario" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="login-usuario" placeholder="Ingrese su usuario" required autocomplete="username">
                </div>
            </div>

            <div class="mb-4">
                <label for="login-contrasena" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="login-contrasena" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" id="toggle-pass">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="btn-login">
                <span id="btn-login-text"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
                <span id="btn-login-spinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span>Verificando...
                </span>
            </button>
        </form>

        <hr class="my-4">
        <div class="text-center" style="font-size:12px;color:#999;">
            <i class="bi bi-info-circle me-1"></i>
            <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; vendedor / vendedor123
        </div>
        
        <hr class="my-3">
        <div class="d-flex justify-content-center gap-2 mt-3 flex-wrap">
            <button type="button" class="btn btn-sm btn-outline-info" id="btn-ver-bd"><i class="bi bi-eye"></i> Ver BD</button>
            <button type="button" class="btn btn-sm btn-outline-success" id="btn-cargar-bd"><i class="bi bi-database-up"></i> Cargar Defectos</button>
            <button type="button" class="btn btn-sm btn-outline-danger" id="btn-vaciar-bd"><i class="bi bi-database-x"></i> Eliminar BD</button>
        </div>
    </div>
</div>

<script src="bt/bootstrap.min.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
